<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash App Payment Admin Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1a4fc4;
      --primary-dark: #0a2a6e;
      --success: #4caf50;
      --warning: #ff9800;
      --error: #f44336;
      --bg: #f5f7fa;
      --white: #ffffff;
      --text: #111111;
      --text-muted: #666666;
      --border: #e0e0e0;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    /* ============================================================================
     * LAYOUT
     * ============================================================================ */

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: var(--white);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Stats Bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .stat-card {
      background: var(--bg);
      padding: 16px;
      border-radius: 8px;
      border-left: 4px solid var(--primary);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-card.pending {
      border-left-color: var(--warning);
    }

    .stat-card.success {
      border-left-color: var(--success);
    }

    /* ============================================================================
     * PENDING APPROVALS LIST
     * ============================================================================ */

    .content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--white);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .panel-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header h2 {
      font-size: 18px;
      font-weight: 700;
    }

    .refresh-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .refresh-btn:hover {
      background: var(--primary-dark);
    }

    .panel-body {
      padding: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ============================================================================
     * APPROVAL CARD
     * ============================================================================ */

    .approval-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: start;
      transition: box-shadow 0.3s;
    }

    .approval-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .approval-card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 16px;
      grid-column: 1 / -1;
    }

    .approval-card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .approval-card-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.pending {
      background: #fff3cd;
      color: #664d03;
    }

    /* Grid: Details */
    .approval-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      grid-column: 1 / -1;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    /* Proof Image */
    .proof-section {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 16px;
    }

    .proof-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: block;
    }

    .proof-image {
      max-width: 100%;
      max-height: 400px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    /* Actions */
    .approval-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      grid-column: 2;
      grid-row: 2 / 4;
      min-width: 140px;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      font-family: var(--font);
    }

    .btn-approve {
      background: var(--success);
      color: white;
    }

    .btn-approve:hover {
      background: #45a049;
    }

    .btn-reject {
      background: var(--error);
      color: white;
    }

    .btn-reject:hover {
      background: #da190b;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ============================================================================
     * MODAL (for rejection reason)
     * ============================================================================ */

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--white);
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .modal textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font);
      font-size: 13px;
      min-height: 100px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-actions button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: var(--font);
    }

    .modal-actions .btn-cancel {
      background: var(--border);
      color: var(--text);
    }

    .modal-actions .btn-reject {
      background: var(--error);
      color: white;
    }

    /* ============================================================================
     * ALERTS
     * ============================================================================ */

    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .alert-success {
      background: #e8f5e9;
      border: 1px solid #c8e6c9;
      color: #2e7d32;
    }

    .alert-error {
      background: #ffebee;
      border: 1px solid #ffcdd2;
      color: #c62828;
    }

    /* ============================================================================
     * RESPONSIVE
     * ============================================================================ */

    @media (max-width: 768px) {
      .approval-card {
        grid-template-columns: 1fr;
      }

      .approval-actions {
        grid-column: 1;
        grid-row: auto;
        flex-direction: row;
        min-width: unset;
      }

      .stats-bar {
        grid-template-columns: 1fr;
      }

      .approval-details {
        grid-template-columns: 1fr 1fr;
      }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <header>
    <h1>💰 Cash App Payment Review</h1>
    <p>Manage pending payment proofs and approve/reject transactions</p>

    <div class="stats-bar">
      <div class="stat-card pending">
        <div class="stat-label">Pending Review</div>
        <div class="stat-value" id="pendingCount">0</div>
      </div>
      <div class="stat-card success">
        <div class="stat-label">Approved Today</div>
        <div class="stat-value" id="approvedCount">0</div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="content">
    <!-- Checkout Payment Approval Form -->
    <div class="panel">
      <div class="panel-header">
        <h2>Approve Pending Order</h2>
      </div>

      <div class="panel-body">
        <form id="approvalForm" onsubmit="handleCheckoutApproval(event)">
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 20px;">
            <!-- Reservation ID Input -->
            <div>
              <label for="reservationId" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">
                Order ID / Reservation ID
              </label>
              <input
                type="text"
                id="reservationId"
                name="reservationId"
                placeholder="e.g., RES-ABC12345"
                required
                style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: var(--font);"
              />
            </div>

            <!-- Payment Tag Input -->
            <div>
              <label for="paymentTag" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">
                Payment Tag / Username
              </label>
              <input
                type="text"
                id="paymentTag"
                name="paymentTag"
                placeholder="e.g., $cashtag or @username"
                style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: var(--font);"
              />
            </div>
          </div>

          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 20px;">
            <!-- Payment Email Input -->
            <div>
              <label for="paymentEmail" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">
                Payment Email
              </label>
              <input
                type="email"
                id="paymentEmail"
                name="paymentEmail"
                placeholder="e.g., user@paypal.com"
                style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: var(--font);"
              />
            </div>

            <!-- Payment ID Input -->
            <div>
              <label for="paymentId" style="display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">
                Reference ID (Optional)
              </label>
              <input
                type="text"
                id="paymentId"
                name="paymentId"
                placeholder="e.g., specific transaction ID"
                style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: var(--font);"
              />
            </div>
          </div>

          <div id="checkoutAlertContainer" style="margin-bottom: 16px;"></div>

          <button
            type="submit"
            id="submitBtn"
            style="padding: 12px 24px; background: var(--success); color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; width: 100%; font-family: var(--font);"
          >
            ✓ Push to Customer
          </button>
        </form>
      </div>
    </div>

    <!-- Pending Approvals -->
    <div class="panel">
      <div class="panel-header">
        <h2>Pending Approvals</h2>
        <button class="refresh-btn" onclick="adminDashboard.loadPendingApprovals()">
          🔄 Refresh
        </button>
      </div>

      <div class="panel-body">
        <div id="alertContainer"></div>
        <div id="pendingList"></div>
      </div>
    </div>
  </div>
</div>

<!-- Rejection Reason Modal -->
<div id="rejectionModal" class="modal-overlay">
  <div class="modal">
    <h3>Reject Payment</h3>
    <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 16px;">
      Add a reason for rejecting this payment proof:
    </p>
    <textarea
      id="rejectionReason"
      placeholder="e.g., Screenshot doesn't show transaction details, Amount doesn't match, etc."
    ></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="adminDashboard.closeRejectionModal()">
        Cancel
      </button>
      <button class="btn-reject" onclick="adminDashboard.confirmRejectPayment()">
        Reject Payment
      </button>
    </div>
  </div>
</div>

<script>
  // ── CHECKOUT APPROVAL HANDLER ──────────────────────────────────────────
  const BACKEND_URL = 'http://localhost:3000';

  async function handleCheckoutApproval(event) {
    event.preventDefault();

    const reservationId = document.getElementById('reservationId').value.trim();
    const paymentTag = document.getElementById('paymentTag').value.trim();
    const paymentEmail = document.getElementById('paymentEmail').value.trim();
    const paymentId = document.getElementById('paymentId').value.trim();

    if (!reservationId) {
      showCheckoutAlert('❌ Please enter an Order ID', 'error');
      return;
    }

    if (!paymentTag && !paymentEmail) {
      showCheckoutAlert('❌ Please enter at least a Payment Tag or Payment Email', 'error');
      return;
    }

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Sending...';

    try {
      const response = await fetch(BACKEND_URL + '/api/checkout/admin/respond', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          reservation_id: reservationId,
          paymentTag: paymentTag || null,
          paymentEmail: paymentEmail || null,
          paymentId: paymentId || null
        })
      });

      if (!response.ok) {
        throw new Error(`Backend error: ${response.status}`);
      }

      const data = await response.json();

      if (!data.success) {
        throw new Error(data.error || 'Failed to approve order');
      }

      showCheckoutAlert('✓ Order approved! Customer screen is updating.', 'success');
      document.getElementById('approvalForm').reset();
      submitBtn.disabled = false;
      submitBtn.innerHTML = '✓ Push to Customer';

    } catch (err) {
      console.error('❌ Error approving order:', err);
      showCheckoutAlert(`❌ Error: ${err.message}`, 'error');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '✓ Push to Customer';
    }
  }

  function showCheckoutAlert(message, type) {
    const container = document.getElementById('checkoutAlertContainer');
    const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
    container.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
    setTimeout(() => {
      container.innerHTML = '';
    }, 5000);
  }
</script>

<script src="js/admin-dashboard.js"></script>

</body>
</html>
